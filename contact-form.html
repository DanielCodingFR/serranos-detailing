<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request an Estimate | Serrano's Mobile Detailing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(12px); }
        .orange-gradient { background: linear-gradient(90deg, #f97316 0%, #ea580c 100%); }
        /* Custom Input Styling */
        .input-field { background: #121212; border: 1px solid #27272a; border-radius: 0.75rem; padding: 1rem; w-full; outline: none; transition: all 0.3s; color: white; }
        .input-field:focus { border-color: #f97316; box-shadow: 0 0 10px rgba(249, 115, 22, 0.1); }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white overflow-x-hidden min-h-screen flex flex-col">

    <nav class="w-full z-50 glass border-b border-white/10 px-6 py-4 flex justify-between items-center fixed top-0">
        <a href="index.html" class="text-xl font-black tracking-tighter">SERRANO'S<span class="text-orange-500">MOBILE</span></a>
        <a href="index.html" class="text-xs font-bold text-gray-400 hover:text-white transition tracking-widest uppercase">← Back to Home</a>
    </nav>

    <section class="flex-grow flex items-center justify-center pt-32 pb-16 px-6 relative">
        <div class="absolute top-1/3 left-1/2 -translate-x-1/2 w-3/4 h-1/2 bg-orange-600/10 blur-[120px] rounded-full z-0 pointer-events-none"></div>

        <div class="relative z-10 w-full max-w-2xl bg-zinc-900/40 p-8 md:p-12 rounded-3xl border border-white/5 shadow-2xl backdrop-blur-sm" data-aos="fade-up" data-aos-duration="1000">
            
            <div class="text-center mb-10">
                <h1 class="text-4xl font-black tracking-tight mb-4">REQUEST AN <span class="text-orange-500">ESTIMATE</span></h1>
                <p class="text-gray-400 text-sm md:text-base">Fill out the details below. We'll get back to you within 24 hours with a custom quote.</p>
            </div>

            <form action="https://formspree.io/f/mvzvrlba" method="POST" class="space-y-6">
                
                <div class="grid md:grid-cols-2 gap-6">
                    <div data-aos="fade-up" data-aos-delay="100">
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">First Name</label>
                        <input type="text" name="firstName" required class="input-field w-full" placeholder="John">
                    </div>
                    <div data-aos="fade-up" data-aos-delay="200">
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Last Name</label>
                        <input type="text" name="lastName" required class="input-field w-full" placeholder="Doe">
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-6">
                    <div data-aos="fade-up" data-aos-delay="300">
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Email Address</label>
                        <input type="email" name="email" required class="input-field w-full" placeholder="john@example.com">
                    </div>
                    <div data-aos="fade-up" data-aos-delay="400">
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Phone Number</label>
                        <input type="tel" name="phone" required class="input-field w-full" placeholder="(555) 123-4567">
                    </div>
                </div>

                <div data-aos="fade-up" data-aos-delay="500">
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Vehicle Make & Model</label>
                    <input type="text" name="vehicle" required class="input-field w-full" placeholder="e.g., 2023 Ford F-150">
                </div>

                <div data-aos="fade-up" data-aos-delay="600">
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Service Needed</label>
                    <select name="service" required class="input-field w-full text-gray-300">
                        <option value="Interior Restoration">Interior Restoration</option>
                        <option value="Paint Correction">Paint Correction</option>
                        <option value="Ceramic Coating">Ceramic Coating</option>
                        <option value="Other">Other (Specify Below)</option>
                    </select>
                </div>

                <div data-aos="fade-up" data-aos-delay="700">
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Additional Details</label>
                    <textarea name="message" rows="4" class="input-field w-full" placeholder="Condition of the vehicle, specific stains, etc..."></textarea>
                </div>

                <div data-aos="fade-up" data-aos-delay="800" class="pt-4">
                    <button type="submit" class="w-full orange-gradient py-4 rounded-xl font-black text-lg shadow-lg shadow-orange-500/20 hover:scale-[1.02] transition transform">
                        SEND REQUEST
                    </button>
                </div>
            </form>
        </div>
    </section>

    <footer class="py-8 border-t border-white/5 text-center text-zinc-700 text-xs bg-black mt-auto">
        <p class="uppercase tracking-widest">© 2026 Serrano's Mobile Detailing LLC.</p>
    </footer>

    <script>
        AOS.init({ duration: 800, once: true });
    </script>
</body>
</html>
